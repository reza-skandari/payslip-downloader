name: Build Windows exe

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up MSVC compiler
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: pip install nuitka zstandard ordered-set playwright customtkinter python-dotenv python-dateutil requests

      - name: Build with Nuitka
        run: |
          python -m nuitka `
            --onefile `
            --assume-yes-for-downloads `
            --windows-console-mode=disable `
            "--onefile-tempdir-spec={CACHE_DIR}\payslip-downloader\{VERSION}" `
            --output-filename=payslip-downloader.exe `
            --output-dir=dist `
            --include-package=playwright `
            --include-package=customtkinter `
            --include-package=dotenv `
            --include-package=dateutil `
            --include-package=requests `
            --include-package=tkinter `
            --include-package-data=playwright `
            --include-package-data=customtkinter `
            --include-data-files=splash.png=splash.png `
            gui.py
        shell: pwsh

      - name: Zip exe
        run: Compress-Archive -Path dist/payslip-downloader.exe -DestinationPath dist/payslip-downloader.zip
        shell: pwsh

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/payslip-downloader.zip
          prerelease: true
          name: ${{ github.ref_name }} (pre-release — pending testing)
          body: |
            Automated build using Nuitka (compiled Python → native binary).
            Extracts to AppData on first run — subsequent launches are instant.

            **How to install:** download the zip, extract it, run `payslip-downloader.exe`.

            ⚠️ Pre-release for testing. The stable download link is unaffected until promoted.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
