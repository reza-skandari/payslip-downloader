name: Build Windows exe

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up MSVC compiler
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: pip install nuitka zstandard ordered-set playwright customtkinter python-dotenv python-dateutil requests

      - name: Get playwright package path
        run: |
          $p = python -c "import playwright, os; print(os.path.dirname(playwright.__file__))"
          echo "PLAYWRIGHT_PATH=$p" | Out-File -FilePath $env:GITHUB_ENV -Append
        shell: pwsh

      - name: Build with Nuitka
        run: |
          python -m nuitka `
            --standalone `
            --assume-yes-for-downloads `
            --windows-console-mode=disable `
            --output-filename=payslip-downloader.exe `
            --output-dir=dist `
            --include-package=playwright `
            --include-package=customtkinter `
            --include-package=dotenv `
            --include-package=dateutil `
            --include-package=requests `
            --include-package=tkinter `
            --include-package-data=playwright `
            --include-package-data=customtkinter `
            --include-data-files=splash.png=splash.png `
            gui.py
        shell: pwsh

      - name: Zip output folder
        run: Compress-Archive -Path dist/gui.dist -DestinationPath dist/payslip-downloader.zip
        shell: pwsh

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/payslip-downloader.zip
          prerelease: true
          name: ${{ github.ref_name }} (pre-release — pending testing)
          body: |
            Automated build using Nuitka (compiled Python → native binary).

            **How to install:** download the zip, extract it anywhere, run `payslip-downloader.exe` inside the folder.

            ⚠️ Pre-release for testing. The stable download link is unaffected until promoted.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
